version: 2
updates:
- package-ecosystem: maven
  directory: /
  schedule:
    interval: weekly
    day: monday
    time: 06:00
    timezone: Europe/Zurich
  open-pull-requests-limit: 10
  groups:
    spring-boot:
      patterns:
      - org.springframework.boot:*
    maven-plugins:
      patterns:
      - org.apache.maven.plugins:*
      - org.sonatype.central:*
  labels:
  - dependencies
  - java
  commit-message:
    prefix: chore(deps)
    prefix-development: chore(deps-dev)
    include: scope
- package-ecosystem: gradle
  directory: /spring-boot-autoconfiguration-optimizer-gradle-plugin
  schedule:
    interval: weekly
    day: monday
    time: 06:00
    timezone: Europe/Zurich
  open-pull-requests-limit: 5
  labels:
  - dependencies
  - gradle
  commit-message:
    prefix: chore(deps)
    prefix-development: chore(deps-dev)
    include: scope
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: weekly
    day: monday
    time: 06:00
    timezone: Europe/Zurich
  open-pull-requests-limit: 10
  groups:
    github-actions:
      patterns:
      - '*'
  labels:
  - dependencies
  - github-actions
  commit-message:
    prefix: ci(deps)
    include: scope
