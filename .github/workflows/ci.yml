name: CI

on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-maven:
    name: Build Maven Modules (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [ '21', '25' ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn --batch-mode --no-transfer-progress verify

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-maven-java${{ matrix.java }}
          path: '**/target/surefire-reports/*.xml'
          retention-days: 7

  build-gradle:
    name: Build Gradle Plugin (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [ '21', '25' ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: gradle

      - name: Build with Gradle
        working-directory: spring-boot-autoconfiguration-optimizer-gradle-plugin
        run: ./gradlew --no-daemon build

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-gradle-java${{ matrix.java }}
          path: 'spring-boot-autoconfiguration-optimizer-gradle-plugin/build/test-results/**/*.xml'
          retention-days: 7

  integration-tests:
    name: Integration Tests (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    needs: [ build-maven, build-gradle ]
    strategy:
      fail-fast: false
      matrix:
        java: [ '21', '25' ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: maven

      - name: Run Maven Integration Tests
        run: mvn --batch-mode --no-transfer-progress verify -pl integration-tests/petclinic-sample -am

      - name: Upload Maven integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results-maven-java${{ matrix.java }}
          path: 'integration-tests/**/target/surefire-reports/*.xml'
          retention-days: 7

      - name: Set up Gradle cache
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: gradle

      - name: Run Gradle Plugin Tests
        working-directory: spring-boot-autoconfiguration-optimizer-gradle-plugin
        run: ./gradlew --no-daemon test

      - name: Upload Gradle integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results-gradle-java${{ matrix.java }}
          path: 'spring-boot-autoconfiguration-optimizer-gradle-plugin/build/test-results/**/*.xml'
          retention-days: 7

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Maven Checkstyle
        run: mvn --batch-mode --no-transfer-progress checkstyle:check -Dcheckstyle.failOnViolation=false || true
