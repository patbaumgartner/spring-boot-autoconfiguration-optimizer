name: CI

on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-maven:
    name: Build Maven Modules (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [ '17', '21', '25' ]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn --batch-mode --no-transfer-progress verify

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-maven-java${{ matrix.java }}
          path: '**/target/surefire-reports/*.xml'
          retention-days: 7

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-maven-java${{ matrix.java }}
          path: '**/target/site/jacoco/'
          retention-days: 7

  build-gradle:
    name: Build Gradle Plugin (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [ '17', '21', '25' ]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: gradle

      - name: Install Maven modules to local repository
        run: mvn --batch-mode --no-transfer-progress install -DskipTests -q -N && mvn --batch-mode --no-transfer-progress install -DskipTests -q -pl autoconfiguration-optimizer-core

      - name: Build with Gradle
        working-directory: spring-boot-autoconfiguration-optimizer-gradle-plugin
        run: ./gradlew --no-daemon build

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-gradle-java${{ matrix.java }}
          path: 'spring-boot-autoconfiguration-optimizer-gradle-plugin/build/test-results/**/*.xml'
          retention-days: 7

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-gradle-java${{ matrix.java }}
          path: 'spring-boot-autoconfiguration-optimizer-gradle-plugin/build/reports/jacoco/'
          retention-days: 7

  integration-tests:
    name: Integration Tests (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    needs: [ build-maven, build-gradle ]
    strategy:
      fail-fast: false
      matrix:
        java: [ '17', '21', '25' ]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: maven

      - name: Install Maven plugin to local repository
        run: mvn --batch-mode --no-transfer-progress install -DskipTests -q -pl spring-boot-autoconfiguration-optimizer-maven-plugin -am

      - name: Run Maven Integration Tests
        run: mvn --batch-mode --no-transfer-progress verify -f integration-tests/petclinic-sample/pom.xml

      - name: Upload Maven integration test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-results-maven-java${{ matrix.java }}
          path: |
            integration-tests/**/target/surefire-reports/*.xml
            integration-tests/**/target/failsafe-reports/*.xml
          retention-days: 7

      - name: Set up Gradle cache
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: gradle

      - name: Publish Gradle plugin to local Maven repository
        working-directory: spring-boot-autoconfiguration-optimizer-gradle-plugin
        run: ./gradlew --no-daemon publishToMavenLocal

      - name: Run Gradle Integration Tests (full train and inject cycle)
        working-directory: integration-tests/petclinic-sample-gradle
        run: |
          ./gradlew --no-daemon bootJar
          ./gradlew --no-daemon trainAutoconfiguration copyAutoconfigurationOptimizerFile
          ./gradlew --no-daemon bootJar test

      - name: Run Gradle Plugin Tests
        working-directory: spring-boot-autoconfiguration-optimizer-gradle-plugin
        run: ./gradlew --no-daemon test

      - name: Upload Gradle integration test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-results-gradle-java${{ matrix.java }}
          path: |
            spring-boot-autoconfiguration-optimizer-gradle-plugin/build/test-results/**/*.xml
            integration-tests/petclinic-sample-gradle/build/test-results/**/*.xml
          retention-days: 7

  benchmark-smoke-maven:
    name: Maven Benchmark Smoke Test
    runs-on: ubuntu-latest
    needs: [ integration-tests ]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install Maven plugin to local repository
        run: mvn --batch-mode --no-transfer-progress install -DskipTests -q -pl spring-boot-autoconfiguration-optimizer-maven-plugin -am

      - name: Build project
        run: mvn --batch-mode --no-transfer-progress package -DskipTests -f integration-tests/petclinic-sample/pom.xml

      - name: Run training run
        id: training
        run: |
          mkdir -p /tmp/benchmark-training
          java \
            -Dautoconfiguration.optimizer.training-run=true \
            -Dautoconfiguration.optimizer.exit-after-training=true \
            -Dautoconfiguration.optimizer.output-directory=/tmp/benchmark-training \
            -Dautoconfiguration.optimizer.output-file=autoconfiguration-optimizer.properties \
            -jar integration-tests/petclinic-sample/target/autoconfiguration-optimizer-petclinic-sample-*.jar \
            --spring.main.banner-mode=off \
            --server.port=0 \
            --spring.jpa.show-sql=false &
          TRAINING_PID=$!

          END_TIME=$(($(date +%s) + 120))
          while kill -0 "${TRAINING_PID}" 2>/dev/null && [ "$(date +%s)" -lt "${END_TIME}" ]; do
            sleep 1
          done

          if kill -0 "${TRAINING_PID}" 2>/dev/null; then
            echo "::error::Training run (PID ${TRAINING_PID}) did not complete within 120 seconds"
            kill -9 "${TRAINING_PID}" 2>/dev/null || true
            exit 1
          fi
          wait "${TRAINING_PID}" 2>/dev/null || true

          echo "Training properties:"
          cat /tmp/benchmark-training/autoconfiguration-optimizer.properties

          TRAINING_AVAILABLE=$(grep -oP '(?<=# Total available auto-configurations: )\d+' /tmp/benchmark-training/autoconfiguration-optimizer.properties || echo "")
          TRAINING_LOADED=$(grep -oP '(?<=# Total auto-configurations loaded: )\d+' /tmp/benchmark-training/autoconfiguration-optimizer.properties || echo "")
          TRAINING_EXCLUDED=$(grep -oP '(?<=# Auto-configurations excluded: )\d+' /tmp/benchmark-training/autoconfiguration-optimizer.properties || echo "")
          echo "training_available=${TRAINING_AVAILABLE}" >> $GITHUB_OUTPUT
          echo "training_loaded=${TRAINING_LOADED}" >> $GITHUB_OUTPUT
          echo "training_excluded=${TRAINING_EXCLUDED}" >> $GITHUB_OUTPUT

      - name: Package optimized fat JAR
        run: |
          mkdir -p integration-tests/petclinic-sample/src/main/resources/META-INF
          cp /tmp/benchmark-training/autoconfiguration-optimizer.properties \
             integration-tests/petclinic-sample/src/main/resources/META-INF/
          mvn --batch-mode --no-transfer-progress package -DskipTests \
            -f integration-tests/petclinic-sample/pom.xml

      - name: Measure baseline startup time
        id: baseline
        run: |
          TMPFILE=$(mktemp)
          java \
            -Dautoconfiguration.optimizer.enabled=false \
            -jar integration-tests/petclinic-sample/target/autoconfiguration-optimizer-petclinic-sample-*.jar \
            --spring.main.banner-mode=off \
            --server.port=0 \
            --spring.jpa.show-sql=false > "${TMPFILE}" 2>&1 &
          JAVA_PID=$!

          OUTPUT=""
          END_TIME=$(($(date +%s) + 60))
          while [ "$(date +%s)" -lt "${END_TIME}" ]; do
            OUTPUT=$(grep -m1 "Started .* in" "${TMPFILE}" 2>/dev/null || true)
            if [ -n "${OUTPUT}" ]; then break; fi
            if ! kill -0 "${JAVA_PID}" 2>/dev/null; then
              OUTPUT=$(grep -m1 "Started .* in" "${TMPFILE}" 2>/dev/null || true)
              break
            fi
            sleep 0.5
          done

          kill "${JAVA_PID}" 2>/dev/null || true
          for attempt in $(seq 1 10); do
            if ! kill -0 "${JAVA_PID}" 2>/dev/null; then break; fi
            sleep 0.5
          done
          kill -9 "${JAVA_PID}" 2>/dev/null || true
          wait "${JAVA_PID}" 2>/dev/null || true
          rm -f "${TMPFILE}"

          SECONDS_VAL=$(echo "${OUTPUT}" | grep -oP 'in \K[\d.]+(?= seconds)' || echo "")
          if [ -n "${SECONDS_VAL}" ]; then
            MS=$(printf "%.0f" $(echo "${SECONDS_VAL} * 1000" | bc))
            echo "Baseline startup time: ${MS}ms"
            echo "baseline_ms=${MS}" >> $GITHUB_OUTPUT
          fi

      - name: Measure optimized startup time
        id: optimized
        run: |
          TMPFILE=$(mktemp)
          java \
            -jar integration-tests/petclinic-sample/target/autoconfiguration-optimizer-petclinic-sample-*.jar \
            --spring.main.banner-mode=off \
            --server.port=0 \
            --spring.jpa.show-sql=false > "${TMPFILE}" 2>&1 &
          JAVA_PID=$!

          OUTPUT=""
          END_TIME=$(($(date +%s) + 60))
          while [ "$(date +%s)" -lt "${END_TIME}" ]; do
            OUTPUT=$(grep -m1 "Started .* in" "${TMPFILE}" 2>/dev/null || true)
            if [ -n "${OUTPUT}" ]; then break; fi
            if ! kill -0 "${JAVA_PID}" 2>/dev/null; then
              OUTPUT=$(grep -m1 "Started .* in" "${TMPFILE}" 2>/dev/null || true)
              break
            fi
            sleep 0.5
          done

          kill "${JAVA_PID}" 2>/dev/null || true
          for attempt in $(seq 1 10); do
            if ! kill -0 "${JAVA_PID}" 2>/dev/null; then break; fi
            sleep 0.5
          done
          kill -9 "${JAVA_PID}" 2>/dev/null || true
          wait "${JAVA_PID}" 2>/dev/null || true
          rm -f "${TMPFILE}"

          SECONDS_VAL=$(echo "${OUTPUT}" | grep -oP 'in \K[\d.]+(?= seconds)' || echo "")
          if [ -n "${SECONDS_VAL}" ]; then
            MS=$(printf "%.0f" $(echo "${SECONDS_VAL} * 1000" | bc))
            echo "Optimized startup time: ${MS}ms"
            echo "optimized_ms=${MS}" >> $GITHUB_OUTPUT
          fi

      - name: Post benchmark summary
        run: |
          BASELINE="${{ steps.baseline.outputs.baseline_ms }}"
          OPTIMIZED="${{ steps.optimized.outputs.optimized_ms }}"

          if [ -n "${BASELINE}" ] && [ -n "${OPTIMIZED}" ] && \
             [ "${BASELINE}" -gt 0 ] && [ "${OPTIMIZED}" -gt 0 ]; then
            IMPROVEMENT=$((BASELINE - OPTIMIZED))
            PCT=$(echo "scale=1; ${IMPROVEMENT} * 100 / ${BASELINE}" | bc)
          else
            IMPROVEMENT="N/A"
            PCT="N/A"
          fi

          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 🚀 Maven Benchmark Smoke Test: Spring Boot Autoconfiguration Optimizer

          | Metric | Value |
          |--------|-------|
          | ⚪ Baseline startup time (1 run) | ${BASELINE:-N/A}ms |
          | 🟢 Optimized startup time (1 run) | ${OPTIMIZED:-N/A}ms |
          | 📈 Improvement | ${IMPROVEMENT}ms |
          | 📊 Speed improvement | ${PCT}% faster |
          | 🔎 Available auto-configurations | ${{ steps.training.outputs.training_available || 'N/A' }} |
          | ✅ Loaded (training set) | ${{ steps.training.outputs.training_loaded || 'N/A' }} |
          | ⛔ Excluded by optimizer | ${{ steps.training.outputs.training_excluded || 'N/A' }} |

          *Single-iteration smoke test. For reliable measurements see the [Benchmarks workflow](${{ github.server_url }}/${{ github.repository }}/actions/workflows/benchmarks.yml).*
          EOF

  benchmark-smoke-gradle:
    name: Gradle Benchmark Smoke Test
    runs-on: ubuntu-latest
    needs: [ integration-tests ]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Install Maven modules to local repository
        run: mvn --batch-mode --no-transfer-progress install -DskipTests -q -N && mvn --batch-mode --no-transfer-progress install -DskipTests -q -pl autoconfiguration-optimizer-core

      - name: Publish Gradle plugin to local Maven repository
        working-directory: spring-boot-autoconfiguration-optimizer-gradle-plugin
        run: ./gradlew --no-daemon publishToMavenLocal

      - name: Build project
        working-directory: integration-tests/petclinic-sample-gradle
        run: ./gradlew --no-daemon bootJar

      - name: Run training run
        id: training
        run: |
          mkdir -p /tmp/benchmark-training-gradle
          java \
            -Dautoconfiguration.optimizer.training-run=true \
            -Dautoconfiguration.optimizer.exit-after-training=true \
            -Dautoconfiguration.optimizer.output-directory=/tmp/benchmark-training-gradle \
            -Dautoconfiguration.optimizer.output-file=autoconfiguration-optimizer.properties \
            -jar integration-tests/petclinic-sample-gradle/build/libs/*.jar \
            --spring.main.banner-mode=off \
            --server.port=0 \
            --spring.jpa.show-sql=false &
          TRAINING_PID=$!

          END_TIME=$(($(date +%s) + 120))
          while kill -0 "${TRAINING_PID}" 2>/dev/null && [ "$(date +%s)" -lt "${END_TIME}" ]; do
            sleep 1
          done

          if kill -0 "${TRAINING_PID}" 2>/dev/null; then
            echo "::error::Training run (PID ${TRAINING_PID}) did not complete within 120 seconds"
            kill -9 "${TRAINING_PID}" 2>/dev/null || true
            exit 1
          fi
          wait "${TRAINING_PID}" 2>/dev/null || true

          echo "Training properties:"
          cat /tmp/benchmark-training-gradle/autoconfiguration-optimizer.properties

          TRAINING_AVAILABLE=$(grep -oP '(?<=# Total available auto-configurations: )\d+' /tmp/benchmark-training-gradle/autoconfiguration-optimizer.properties || echo "")
          TRAINING_LOADED=$(grep -oP '(?<=# Total auto-configurations loaded: )\d+' /tmp/benchmark-training-gradle/autoconfiguration-optimizer.properties || echo "")
          TRAINING_EXCLUDED=$(grep -oP '(?<=# Auto-configurations excluded: )\d+' /tmp/benchmark-training-gradle/autoconfiguration-optimizer.properties || echo "")
          echo "training_available=${TRAINING_AVAILABLE}" >> $GITHUB_OUTPUT
          echo "training_loaded=${TRAINING_LOADED}" >> $GITHUB_OUTPUT
          echo "training_excluded=${TRAINING_EXCLUDED}" >> $GITHUB_OUTPUT

      - name: Package optimized fat JAR
        run: |
          mkdir -p integration-tests/petclinic-sample/src/main/resources/META-INF
          cp /tmp/benchmark-training-gradle/autoconfiguration-optimizer.properties \
             integration-tests/petclinic-sample/src/main/resources/META-INF/
          cd integration-tests/petclinic-sample-gradle && ./gradlew --no-daemon bootJar

      - name: Measure baseline startup time
        id: baseline
        run: |
          TMPFILE=$(mktemp)
          java \
            -Dautoconfiguration.optimizer.enabled=false \
            -jar integration-tests/petclinic-sample-gradle/build/libs/*.jar \
            --spring.main.banner-mode=off \
            --server.port=0 \
            --spring.jpa.show-sql=false > "${TMPFILE}" 2>&1 &
          JAVA_PID=$!

          OUTPUT=""
          END_TIME=$(($(date +%s) + 60))
          while [ "$(date +%s)" -lt "${END_TIME}" ]; do
