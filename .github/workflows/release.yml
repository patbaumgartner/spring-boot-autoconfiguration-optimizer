name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Release Maven and Gradle Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set Maven version
        run: mvn --batch-mode versions:set -DnewVersion=${{ steps.version.outputs.VERSION }} -DgenerateBackupPoms=false

      - name: Install Maven core to local repository
        run: mvn --batch-mode --no-transfer-progress install -DskipTests -q -N && mvn --batch-mode --no-transfer-progress install -DskipTests -q -pl autoconfiguration-optimizer-core

      - name: Update Gradle plugin version and core dependency version
        working-directory: spring-boot-autoconfiguration-optimizer-gradle-plugin
        run: |
          sed -i "s/^version = '.*'/version = '${{ steps.version.outputs.VERSION }}'/" build.gradle
          sed -i "s/autoconfiguration-optimizer-core:[^']*'/autoconfiguration-optimizer-core:${{ steps.version.outputs.VERSION }}'/" build.gradle

      - name: Stage Maven artifacts to local directory
        run: mvn --batch-mode --no-transfer-progress deploy -Ppublication

      - name: Stage Gradle plugin artifacts to local directory
        working-directory: spring-boot-autoconfiguration-optimizer-gradle-plugin
        run: ./gradlew --no-daemon publishAllPublicationsToStagingRepository

      - name: Deploy to Maven Central via JReleaser
        env:
          JRELEASER_MAVENCENTRAL_SONATYPE_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          JRELEASER_MAVENCENTRAL_SONATYPE_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ steps.version.outputs.VERSION }}" --repo ${{ github.repository }} > /dev/null 2>&1; then
            echo "GitHub release v${{ steps.version.outputs.VERSION }} already exists — running jreleaser:deploy only (Maven Central)"
            mvn --batch-mode jreleaser:deploy -N
          else
            mvn --batch-mode jreleaser:full-release -N
          fi

      - name: Publish Gradle Plugin to Plugin Portal
        continue-on-error: true
        working-directory: spring-boot-autoconfiguration-optimizer-gradle-plugin
        run: ./gradlew --no-daemon publishPlugins
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}

      - name: JReleaser output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jreleaser-release
          path: |
            target/jreleaser/trace.log
            target/jreleaser/output.properties
          retention-days: 7
