plugins {
    id 'java-gradle-plugin'
    id 'maven-publish'
    id 'com.gradle.plugin-publish' version '2.1.0'
}

group = 'com.fortytwotalents'
version = '1.0.0-SNAPSHOT'

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
    withJavadocJar()
    withSourcesJar()
}

repositories {
    mavenCentral()
}

dependencies {
    implementation gradleApi()

    testImplementation gradleTestKit()
    testImplementation platform('org.junit:junit-bom:5.11.4')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testImplementation 'org.assertj:assertj-core:3.27.7'
}

test {
    useJUnitPlatform()
}

gradlePlugin {
    website = 'https://github.com/patbaumgartner/spring-boot-autoconfiguration-optimizer'
    vcsUrl = 'https://github.com/patbaumgartner/spring-boot-autoconfiguration-optimizer'
    plugins {
        autoconfigurationOptimizerPlugin {
            id = 'com.fortytwotalents.autoconfiguration-optimizer'
            implementationClass = 'com.fortytwotalents.optimizer.gradle.AutoConfigurationOptimizerPlugin'
            displayName = 'Spring Boot Autoconfiguration Optimizer'
            description = 'Analyzes and optimizes Spring Boot auto-configurations to improve startup time'
            tags.set(['spring-boot', 'autoconfiguration', 'optimization', 'startup-time'])
        }
    }
}

publishing {
    repositories {
        maven {
            name = 'localPluginRepository'
            url = layout.buildDirectory.dir('local-plugin-repository')
        }
    }
}
