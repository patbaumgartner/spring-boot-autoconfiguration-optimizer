<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Owner Details</title></head>
<body>
<h1 th:text="${owner.firstName + ' ' + owner.lastName}">Owner Name</h1>
<p th:text="${owner.city}">City</p>
<h2>Pets</h2>
<ul>
    <li th:each="pet : ${owner.pets}" th:text="${pet.name}">Pet Name</li>
</ul>
<a href="/owners">Back to List</a>
</body>
</html>
